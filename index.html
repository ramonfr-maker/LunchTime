<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LunchTime 🍜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fffbf5;
  --surface: #ffffff;
  --surface-warm: #fdf6ec;
  --surface-deep: #faecd8;
  --border: rgba(160,90,20,0.1);
  --border-mid: rgba(160,90,20,0.17);
  --border-strong: rgba(160,90,20,0.28);
  --text-primary: #1e1408;
  --text-secondary: #6b4e28;
  --text-muted: #b08a5a;
  --tomato: #d94f2a;
  --tomato-hover: #bc3e1c;
  --tomato-light: #fff0ec;
  --tomato-mid: #f4b9a8;
  --herb: #3a6b40;
  --herb-light: #eaf4eb;
  --mustard: #c08a18;
  --mustard-light: #fef8e6;
  --danger: #b91c1c;
  --danger-light: #fef2f2;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 26px;
  --shadow-sm: 0 1px 4px rgba(160,90,20,0.07), 0 1px 2px rgba(160,90,20,0.04);
  --shadow-card: 0 2px 12px rgba(160,90,20,0.09), 0 1px 3px rgba(160,90,20,0.05);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #140e06;
    --surface: #1e1609;
    --surface-warm: #271e0e;
    --surface-deep: #31250f;
    --border: rgba(230,170,80,0.08);
    --border-mid: rgba(230,170,80,0.14);
    --border-strong: rgba(230,170,80,0.24);
    --text-primary: #f5ead8;
    --text-secondary: #c09a6a;
    --text-muted: #7a5c38;
    --tomato: #e8704a;
    --tomato-hover: #f07d52;
    --tomato-light: #2e1508;
    --tomato-mid: #6b2e14;
    --herb: #5abd6a;
    --herb-light: #0f2813;
    --mustard: #e8c050;
    --mustard-light: #26190a;
    --danger: #f87171;
    --danger-light: #2a1010;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.4);
    --shadow-card: 0 2px 12px rgba(0,0,0,0.45);
  }
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Nunito', system-ui, sans-serif;
  font-weight: 400;
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
}

/* ── Tiled food-icon background ── */
.bg-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  font-size: 64px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  opacity: 0.035;
  overflow: hidden;
  user-select: none;
}

.bg-wrap span {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100px;
}

/* ── Page ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 620px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem 5rem;
}

/* ── Hero Header ── */
.hero {
  text-align: center;
  margin-bottom: 2rem;
  padding: 1.8rem 1rem 1.4rem;
  position: relative;
}

.hero-emoji-row {
  font-size: 28px;
  letter-spacing: 8px;
  margin-bottom: 0.7rem;
  display: block;
}

h1 {
  font-family: 'Lora', Georgia, serif;
  font-size: 44px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 0.4rem;
}

h1 em {
  font-style: italic;
  color: var(--tomato);
}

.tagline {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.02em;
}

.coord-btn {
  position: absolute;
  top: 0;
  right: 0;
  background: transparent;
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-md);
  padding: 7px 13px;
  font-size: 11px;
  font-family: 'Nunito', system-ui, sans-serif;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: all 0.18s;
}
.coord-btn:hover {
  border-color: var(--border-strong);
  color: var(--text-secondary);
  background: var(--surface-warm);
}

/* ── Stats Row ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 1.25rem;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.3rem;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 13px;
}

.stat-icon {
  font-size: 28px;
  flex-shrink: 0;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 2px;
  font-weight: 700;
}

.stat-value {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1;
}

.stat-value.highlight { color: var(--tomato); }

/* ── Restaurant Banner ── */
.restaurant-banner {
  background: var(--tomato-light);
  border: 1px solid var(--tomato-mid);
  border-radius: var(--radius-xl);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
}

.restaurant-banner::after {
  content: '🍽️';
  position: absolute;
  right: 14px;
  bottom: -6px;
  font-size: 56px;
  opacity: 0.14;
  pointer-events: none;
  transform: rotate(-14deg);
}

.banner-emoji {
  font-size: 30px;
  flex-shrink: 0;
}

.banner-text { flex: 1; min-width: 0; }

.banner-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--tomato);
  font-weight: 700;
  margin-bottom: 3px;
}

.restaurant-name {
  font-family: 'Lora', Georgia, serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.no-restaurant {
  font-size: 15px;
  color: var(--text-muted);
  font-style: italic;
}

.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  color: var(--herb);
  background: var(--herb-light);
  border: 1px solid rgba(58,107,64,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex-shrink: 0;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--herb);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.35; transform: scale(0.8); }
}

/* ── Coordinator Panel ── */
.coord-panel {
  background: var(--mustard-light);
  border: 1px solid rgba(192,138,24,0.25);
  border-radius: var(--radius-lg);
  padding: 1.2rem 1.4rem;
  margin-bottom: 1.25rem;
  display: none;
}

.coord-panel.visible { display: block; }

.panel-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--mustard);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 1rem;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow-card);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.1rem;
}

.card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.count-pill {
  font-size: 12px;
  font-weight: 700;
  background: var(--tomato-light);
  color: var(--tomato);
  border: 1px solid var(--tomato-mid);
  border-radius: 20px;
  padding: 3px 11px;
  display: none;
}

/* ── Form Elements ── */
.field { margin-bottom: 1rem; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

input[type="text"],
input[type="password"],
textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: var(--surface-warm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Nunito', system-ui, sans-serif;
  font-weight: 400;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input::placeholder, textarea::placeholder { color: var(--text-muted); font-style: italic; }

input:focus, textarea:focus {
  border-color: var(--tomato);
  box-shadow: 0 0 0 3px rgba(217,79,42,0.1);
  background: var(--surface);
}

textarea { resize: vertical; line-height: 1.6; }

/* ── Buttons ── */
button { font-family: 'Nunito', system-ui, sans-serif; cursor: pointer; transition: all 0.15s; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-mid);
  background: var(--surface-warm);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
}
.btn:hover { background: var(--surface-deep); }
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: var(--tomato);
  color: #fff;
  border: none;
  width: 100%;
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-lg);
  letter-spacing: 0.02em;
  box-shadow: 0 3px 10px rgba(217,79,42,0.28);
}

.btn-primary:hover {
  background: var(--tomato-hover);
  box-shadow: 0 5px 16px rgba(217,79,42,0.38);
  transform: translateY(-1px);
}

.btn-primary:active { transform: scale(0.98) translateY(0); }

.btn-danger {
  background: var(--danger-light);
  color: var(--danger);
  border-color: rgba(185,28,28,0.18);
  font-size: 13px;
  padding: 8px 14px;
}
.btn-danger:hover { opacity: 0.85; }

.row { display: flex; gap: 8px; }
.row input { flex: 1; }

/* ── Order List ── */
.order-list { list-style: none; }

.order-item {
  display: flex;
  align-items: flex-start;
  gap: 13px;
  padding: 0.95rem 0;
  border-bottom: 1px solid var(--border);
  animation: slideIn 0.3s ease both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.order-item:last-child { border-bottom: none; padding-bottom: 0; }
.order-item:first-child { padding-top: 0; }

.order-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--tomato-light);
  border: 2px solid var(--tomato-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--tomato);
  flex-shrink: 0;
}

.order-body { flex: 1; min-width: 0; }

.order-meta {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 3px;
}

.order-person {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}

.order-food-emoji {
  font-size: 15px;
  line-height: 1;
}

.order-detail {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.55;
  font-weight: 400;
}

.empty-state {
  text-align: center;
  padding: 2.5rem 0 1.5rem;
}

.empty-art {
  font-size: 52px;
  display: block;
  margin-bottom: 0.6rem;
}

.empty-msg {
  font-size: 15px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Feedback ── */
.feedback {
  font-size: 13px;
  margin-top: 10px;
  min-height: 20px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 5px;
}
.feedback.success { color: var(--herb); }
.feedback.error { color: var(--danger); }

/* ── Loading ── */
.loading {
  text-align: center;
  padding: 1.5rem 0;
  color: var(--text-muted);
  font-size: 14px;
  font-style: italic;
}

/* ── Decorative divider ── */
.food-divider {
  text-align: center;
  font-size: 18px;
  letter-spacing: 10px;
  margin: 0.25rem 0 1.25rem;
  user-select: none;
  opacity: 0.45;
}

/* ── Footer ── */
.footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 0.5rem;
  letter-spacing: 0.03em;
}
</style>
</head>
<body>

<!-- Tiled food background -->
<div class="bg-wrap" aria-hidden="true">
  <span>🍕</span><span>🌮</span><span>🍜</span><span>🥗</span><span>🍔</span><span>🍱</span>
  <span>🥙</span><span>🫕</span><span>🍗</span><span>🥘</span><span>🍛</span><span>🌯</span>
  <span>🍣</span><span>🥪</span><span>🍝</span><span>🍲</span><span>🥫</span><span>🍤</span>
  <span>🌽</span><span>🥑</span><span>🍅</span><span>🥕</span><span>🧀</span><span>🥚</span>
  <span>🍕</span><span>🌮</span><span>🍜</span><span>🥗</span><span>🍔</span><span>🍱</span>
  <span>🥙</span><span>🫕</span><span>🍗</span><span>🥘</span><span>🍛</span><span>🌯</span>
</div>

<div class="page">

  <!-- Hero Header -->
  <header class="hero">
    <button class="coord-btn" onclick="toggleCoord()">⚙ Coordinator</button>
    <span class="hero-emoji-row">🥢 🍴 🥄</span>
    <h1>Lunch<em>Time</em></h1>
    <p class="tagline">What's everyone having today?</p>
  </header>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div>
        <div class="stat-label">Participants</div>
        <div class="stat-value highlight" id="participantCount">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧾</div>
      <div>
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="totalOrders">—</div>
      </div>
    </div>
  </div>

  <!-- Restaurant Banner -->
  <div class="restaurant-banner">
    <div class="banner-emoji">🏮</div>
    <div class="banner-text">
      <div class="banner-label">Today we're ordering from</div>
      <div id="restaurantDisplay" class="no-restaurant">Loading…</div>
    </div>
    <div class="live-pill">
      <span class="live-dot"></span>
      Live
    </div>
  </div>

  <!-- Coordinator Panel -->
  <div class="coord-panel" id="coordSection">
    <div class="panel-title">🔑 Coordinator controls</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="coordPass" placeholder="Enter coordinator password" />
    </div>
    <div id="coordControls" style="display:none;">
      <div class="field">
        <label>Set today's restaurant</label>
        <div class="row">
          <input type="text" id="restaurantInput" placeholder="e.g. Chipotle, Subway…" />
          <button class="btn" onclick="setRestaurant()">Set</button>
        </div>
      </div>
      <button class="btn btn-danger" onclick="clearAll()">🗑 Clear all orders &amp; restaurant</button>
    </div>
    <div id="coordFeedback" class="feedback"></div>
  </div>

  <div class="food-divider">🌿 · 🍋 · 🌿</div>

  <!-- Add Order Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">🖊 Place your order</div>
    </div>
    <div class="field">
      <label>Your name</label>
      <input type="text" id="nameInput" placeholder="e.g. Sarah" />
    </div>
    <div class="field">
      <label>What are you getting?</label>
      <textarea id="orderInput" rows="2" placeholder="e.g. Chicken burrito bowl, no sour cream, extra guac"></textarea>
    </div>
    <button class="btn-primary" onclick="submitOrder()">🍽 Submit my order</button>
    <div id="submitFeedback" class="feedback"></div>
  </div>

  <!-- Orders Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📋 Team orders</div>
      <span class="count-pill" id="orderCountPill"></span>
    </div>
    <ul class="order-list" id="orderList">
      <li class="loading">Loading orders…</li>
    </ul>
  </div>

  <p class="footer">Auto-refreshes every 10 s &nbsp;·&nbsp; LunchTime 🍜</p>

</div>

<script>
const SUPABASE_URL = "https://kxpzfzqcxyeksodqnfge.supabase.co";
const SUPABASE_KEY = "sb_publishable_ItOpLbRWHKZvQbwqH83XCg_n1-d5ddB";
const COORD_PASSWORD = "lunch123";
const HEADERS = {
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY
};

let coordUnlocked = false;
let coordVisible = false;

async function api(path, method, body) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: method || "GET",
    headers: HEADERS,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadRestaurant() {
  try {
    const rows = await api("restaurant?select=name&limit=1");
    const display = document.getElementById("restaurantDisplay");
    if (rows && rows.length > 0 && rows[0].name) {
      display.textContent = rows[0].name;
      display.className = "restaurant-name";
    } else {
      display.textContent = "No restaurant set yet";
      display.className = "no-restaurant";
    }
  } catch(e) {
    document.getElementById("restaurantDisplay").textContent = "Could not load";
  }
}

async function loadOrders() {
  try {
    const rows = await api("orders?select=person_name,order_detail&order=id.asc");
    renderOrders(rows || []);
  } catch(e) {
    document.getElementById("orderList").innerHTML = '<li class="empty-state"><span class="empty-msg">Could not load orders.</span></li>';
  }
}

function foodEmoji(text) {
  const t = (text || "").toLowerCase();
  if (/burger|bun|smash|beef patty/.test(t)) return "🍔";
  if (/pizza|slice/.test(t)) return "🍕";
  if (/sushi|roll|salmon|tuna|maki/.test(t)) return "🍱";
  if (/taco/.test(t)) return "🌮";
  if (/burrito|bowl|guac|chipotle/.test(t)) return "🌯";
  if (/salad|caesar|greek|arugula/.test(t)) return "🥗";
  if (/sandwich|sub|hoagie/.test(t)) return "🥪";
  if (/wrap/.test(t)) return "🥙";
  if (/noodle|ramen|pho|udon|soba/.test(t)) return "🍜";
  if (/pasta|spaghetti|linguine|fettuccine/.test(t)) return "🍝";
  if (/soup|chili|stew|bisque/.test(t)) return "🫕";
  if (/curry/.test(t)) return "🍛";
  if (/rice|fried rice/.test(t)) return "🍚";
  if (/chicken|wings|nugget|grilled/.test(t)) return "🍗";
  if (/fish|seafood|shrimp|lobster/.test(t)) return "🐟";
  if (/veg|tofu|veggie|falafel/.test(t)) return "🥦";
  if (/steak|bbq|ribs|brisket/.test(t)) return "🥩";
  return "🍽️";
}

function renderOrders(orders) {
  const list = document.getElementById("orderList");
  const pill = document.getElementById("orderCountPill");
  const participantEl = document.getElementById("participantCount");
  const totalEl = document.getElementById("totalOrders");
  const count = orders.length;

  participantEl.textContent = count;
  totalEl.textContent = count;

  if (!count) {
    list.innerHTML = `<li class="empty-state">
      <span class="empty-art">🍽️</span>
      <span class="empty-msg">No orders yet — be the first!</span>
    </li>`;
    pill.style.display = "none";
    return;
  }

  pill.textContent = count === 1 ? "1 order" : count + " orders";
  pill.style.display = "inline-block";

  list.innerHTML = orders.map((o, i) => {
    const initials = o.person_name.trim().split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    const emoji = foodEmoji(o.order_detail);
    return `<li class="order-item" style="animation-delay:${i * 0.05}s">
      <div class="order-avatar">${initials}</div>
      <div class="order-body">
        <div class="order-meta">
          <span class="order-person">${esc(o.person_name)}</span>
          <span class="order-food-emoji">${emoji}</span>
        </div>
        <div class="order-detail">${esc(o.order_detail)}</div>
      </div>
    </li>`;
  }).join("");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function toggleCoord() {
  coordVisible = !coordVisible;
  document.getElementById("coordSection").classList.toggle("visible", coordVisible);
  if (!coordVisible) {
    coordUnlocked = false;
    document.getElementById("coordControls").style.display = "none";
    document.getElementById("coordPass").value = "";
  }
}

document.getElementById("coordPass").addEventListener("input", function() {
  if (this.value === COORD_PASSWORD) {
    coordUnlocked = true;
    document.getElementById("coordControls").style.display = "block";
    setFeedback("coordFeedback", "✓ Access granted", "success");
  }
});

async function setRestaurant() {
  if (!coordUnlocked) return;
  const val = document.getElementById("restaurantInput").value.trim();
  if (!val) return;
  try {
    await api("restaurant?id=gt.0", "DELETE");
    await api("restaurant", "POST", { name: val });
    document.getElementById("restaurantInput").value = "";
    setFeedback("coordFeedback", "✓ Restaurant set to " + val, "success");
    loadRestaurant();
  } catch(e) {
    setFeedback("coordFeedback", "Error setting restaurant.", "error");
  }
}

async function clearAll() {
  if (!coordUnlocked) return;
  if (!confirm("Clear all orders and reset the restaurant?")) return;
  try {
    await api("orders?id=gt.0", "DELETE");
    await api("restaurant?id=gt.0", "DELETE");
    setFeedback("coordFeedback", "✓ Everything cleared", "success");
    loadRestaurant();
    loadOrders();
  } catch(e) {
    setFeedback("coordFeedback", "Error clearing data.", "error");
  }
}

async function submitOrder() {
  const name = document.getElementById("nameInput").value.trim();
  const order = document.getElementById("orderInput").value.trim();
  if (!name || !order) {
    setFeedback("submitFeedback", "Please fill in your name and order.", "error");
    return;
  }
  try {
    const existing = await api("orders?person_name=eq." + encodeURIComponent(name) + "&select=id");
    if (existing && existing.length > 0) {
      await api("orders?person_name=eq." + encodeURIComponent(name), "PATCH", { order_detail: order });
      setFeedback("submitFeedback", "✓ Order updated!", "success");
    } else {
      await api("orders", "POST", { person_name: name, order_detail: order });
      setFeedback("submitFeedback", "✓ Added! Bon appétit 🎉", "success");
    }
    document.getElementById("nameInput").value = "";
    document.getElementById("orderInput").value = "";
    loadOrders();
  } catch(e) {
    setFeedback("submitFeedback", "Error submitting order.", "error");
  }
}

function setFeedback(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = "feedback " + type;
  setTimeout(() => { el.textContent = ""; el.className = "feedback"; }, 3500);
}

loadRestaurant();
loadOrders();
setInterval(() => { loadRestaurant(); loadOrders(); }, 10000);
</script>
</body>
</html>
