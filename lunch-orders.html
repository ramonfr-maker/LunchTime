<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Lunch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-secondary: #f0ede8;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-muted: #9a9a96;
      --accent: #2d6a4f;
      --accent-light: #e8f5ee;
      --accent-text: #1b4332;
      --danger: #c0392b;
      --danger-light: #fdf0ef;
      --danger-text: #922b21;
      --info-bg: #e8f0fb;
      --info-text: #1a4a8a;
      --radius-md: 8px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --surface-secondary: #2e2e2b;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
        --text-primary: #f0ede8;
        --text-secondary: #a0a09b;
        --text-muted: #6b6b67;
        --accent: #52b788;
        --accent-light: #1b3d2a;
        --accent-text: #95d5b2;
        --danger: #e74c3c;
        --danger-light: #2c1a18;
        --danger-text: #f1948a;
        --info-bg: #1a2a45;
        --info-text: #90b8f8;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app {
      max-width: 580px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
    }

    .restaurant-banner {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .restaurant-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 5px;
    }

    .restaurant-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .no-restaurant {
      font-size: 15px;
      color: var(--text-muted);
      font-style: italic;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 0.85rem; }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    input[type="text"], input[type="password"], textarea {
      width: 100%;
      padding: 9px 12px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--surface-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
    }

    textarea { resize: vertical; }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 18px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-strong);
      background: var(--surface-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: var(--border); }
    button:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent-text); border-color: var(--accent-text); }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger-text);
      border-color: var(--danger);
    }

    .btn-danger:hover { opacity: 0.85; }

    .coord-toggle {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      background: none;
      border: none;
      padding: 0;
    }

    .coord-section {
      background: var(--surface-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .coord-section .card-title { color: #b07d2a; }

    .order-list { list-style: none; }

    .order-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 0.75rem 0;
      border-bottom: 0.5px solid var(--border);
    }

    .order-item:last-child { border-bottom: none; }

    .order-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--info-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--info-text);
      flex-shrink: 0;
    }

    .order-person { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .order-detail { font-size: 13px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }

    .empty-state {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .feedback {
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }

    .feedback.success { color: var(--accent); }
    .feedback.error { color: var(--danger); }

    .count-badge {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 5px;
    }

    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
  </style>
</head>
<body>
  <div class="app">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.25rem;">
      <h1>Today's lunch</h1>
      <button class="coord-toggle" onclick="toggleCoord()">coordinator mode</button>
    </div>
    <p class="subtitle">See what everyone's ordering and add your own.</p>

    <div class="restaurant-banner">
      <div>
        <div class="restaurant-label">ordering from</div>
        <div id="restaurantDisplay" class="no-restaurant">No restaurant set yet</div>
      </div>
    </div>

    <div class="coord-section" id="coordSection" style="display:none;">
      <div class="card-title">Coordinator controls</div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="coordPass" placeholder="Enter coordinator password" />
      </div>
      <div id="coordControls" style="display:none;">
        <div class="field">
          <label>Set restaurant for today</label>
          <div class="row">
            <input type="text" id="restaurantInput" placeholder="e.g. Chipotle" />
            <button onclick="setRestaurant()">Set</button>
          </div>
        </div>
        <button class="btn-danger" onclick="clearAll()">Clear all orders &amp; restaurant</button>
      </div>
      <div id="coordFeedback" class="feedback"></div>
    </div>

    <div class="card">
      <div class="card-title">Add your order</div>
      <div class="field">
        <label>Your name</label>
        <input type="text" id="nameInput" placeholder="e.g. Sarah" />
      </div>
      <div class="field">
        <label>What are you getting?</label>
        <textarea id="orderInput" rows="2" placeholder="e.g. Chicken burrito bowl, no sour cream, extra guac"></textarea>
      </div>
      <button class="btn-primary" onclick="submitOrder()">Submit order</button>
      <div id="submitFeedback" class="feedback"></div>
    </div>

    <div class="card">
      <div class="card-title">Orders <span class="count-badge" id="orderCount"></span></div>
      <ul class="order-list" id="orderList">
        <li class="empty-state">No orders yet — be the first!</li>
      </ul>
    </div>
  </div>

  <script>
    const COORD_PASSWORD = "lunch123";
    let coordUnlocked = false;
    let coordVisible = false;

    const state = { restaurant: "", orders: [] };

    function load() {
      try { state.restaurant = localStorage.getItem("lunch-restaurant") || ""; } catch(e) {}
      try { state.orders = JSON.parse(localStorage.getItem("lunch-orders") || "[]"); } catch(e) {}
      render();
    }

    function save() {
      try {
        localStorage.setItem("lunch-restaurant", state.restaurant);
        localStorage.setItem("lunch-orders", JSON.stringify(state.orders));
      } catch(e) {}
    }

    function render() {
      const display = document.getElementById("restaurantDisplay");
      if (state.restaurant) {
        display.textContent = state.restaurant;
        display.className = "restaurant-name";
      } else {
        display.textContent = "No restaurant set yet";
        display.className = "no-restaurant";
      }

      const list = document.getElementById("orderList");
      const count = document.getElementById("orderCount");

      if (state.orders.length === 0) {
        list.innerHTML = '<li class="empty-state">No orders yet — be the first!</li>';
        count.textContent = "";
      } else {
        count.textContent = "(" + state.orders.length + ")";
        list.innerHTML = state.orders.map(o => {
          const initials = o.name.trim().split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
          return '<li class="order-item"><div class="order-avatar">' + initials + '</div><div><div class="order-person">' + esc(o.name) + '</div><div class="order-detail">' + esc(o.order) + '</div></div></li>';
        }).join("");
      }
    }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function toggleCoord() {
      coordVisible = !coordVisible;
      document.getElementById("coordSection").style.display = coordVisible ? "block" : "none";
      if (!coordVisible) {
        coordUnlocked = false;
        document.getElementById("coordControls").style.display = "none";
        document.getElementById("coordPass").value = "";
      }
    }

    document.getElementById("coordPass").addEventListener("input", function() {
      if (this.value === COORD_PASSWORD) {
        coordUnlocked = true;
        document.getElementById("coordControls").style.display = "block";
        setFeedback("coordFeedback", "Access granted.", "success");
      }
    });

    function setRestaurant() {
      if (!coordUnlocked) return;
      const val = document.getElementById("restaurantInput").value.trim();
      if (!val) return;
      state.restaurant = val;
      save();
      document.getElementById("restaurantInput").value = "";
      setFeedback("coordFeedback", "Restaurant set to " + val + ".", "success");
      render();
    }

    function clearAll() {
      if (!coordUnlocked) return;
      if (!confirm("Clear all orders and reset the restaurant?")) return;
      state.orders = [];
      state.restaurant = "";
      save();
      setFeedback("coordFeedback", "Everything cleared.", "success");
      render();
    }

    function submitOrder() {
      const name = document.getElementById("nameInput").value.trim();
      const order = document.getElementById("orderInput").value.trim();
      if (!name || !order) {
        setFeedback("submitFeedback", "Please enter your name and order.", "error");
        return;
      }
      const idx = state.orders.findIndex(o => o.name.toLowerCase() === name.toLowerCase());
      if (idx > -1) {
        state.orders[idx].order = order;
        setFeedback("submitFeedback", "Order updated!", "success");
      } else {
        state.orders.push({ name, order });
        setFeedback("submitFeedback", "Order added!", "success");
      }
      save();
      document.getElementById("nameInput").value = "";
      document.getElementById("orderInput").value = "";
      render();
    }

    function setFeedback(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = "feedback " + type;
      setTimeout(() => { el.textContent = ""; el.className = "feedback"; }, 3000);
    }

    load();
  </script>
</body>
</html>
